name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - 'imovelstand-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'imovelstand-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: imovelstand-frontend

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: imovelstand-frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit (high severity)
        run: npm audit --audit-level=high || true

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: imovelstand-frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: imovelstand-frontend/playwright-report
          if-no-files-found: ignore
