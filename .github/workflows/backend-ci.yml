name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'ImovelStand.Api/**'
      - 'ImovelStand.Tests/**'
      - 'ImovelStand.sln'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ImovelStand.Api/**'
      - 'ImovelStand.Tests/**'
      - 'ImovelStand.sln'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ImovelStand.sln

      - name: Build (Release)
        run: dotnet build ImovelStand.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ImovelStand.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Check vulnerable packages
        run: dotnet list ImovelStand.sln package --vulnerable --include-transitive 2>&1 | tee vuln.txt && ! grep -q 'has the following vulnerable packages' vuln.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          if-no-files-found: ignore
