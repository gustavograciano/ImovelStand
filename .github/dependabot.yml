version: 2
updates:
  - package-ecosystem: nuget
    directory: "/ImovelStand.Api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      aspnet:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.EntityFrameworkCore*"
          - "Microsoft.IdentityModel.*"
          - "System.IdentityModel.*"
      serilog:
        patterns:
          - "Serilog*"

  - package-ecosystem: nuget
    directory: "/ImovelStand.Tests"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: "/imovelstand-frontend"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/ImovelStand.Api"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/imovelstand-frontend"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
