services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: imovelstand-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - imovelstand-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD:-YourStrong@Passw0rd}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  seq:
    image: datalust/seq:latest
    container_name: imovelstand-seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - imovelstand-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: imovelstand-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - imovelstand-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ImovelStand.Api/Dockerfile
    container_name: imovelstand-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ImovelStandDb;User Id=sa;Password=${SQL_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - imovelstand-network
    restart: on-failure

  frontend:
    build:
      context: ./imovelstand-frontend
      dockerfile: Dockerfile
    container_name: imovelstand-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - imovelstand-network
    restart: on-failure

volumes:
  sqlserver_data:
  seq_data:
  minio_data:

networks:
  imovelstand-network:
    driver: bridge
